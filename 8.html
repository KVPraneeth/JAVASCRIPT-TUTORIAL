<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body>
    <div id="main" class="container">
      <ul id="nav">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
      </ul>
    </div>
    <script>
      let main = document.getElementById("main");
      console.log(main);

      let nav = document.getElementById("nav");
      console.log(nav);

      let containers = document.getElementsByClassName("container");
      console.log(containers);

      // Difference between main and containers
      console.log(main === containers[0]); // true
      // However, main is a single element, while containers is an HTMLCollection of elements with the class "container".

      let sel = document.querySelector("#main");
      console.log(sel);

      let sel2 = document.querySelector(".container");
      console.log(sel2);

      let sel3 = document.querySelectorAll(".container");
      console.log(sel3);
      // Difference between sel2 and sel3
      console.log(sel2 === sel3[0]); // true
      // However, sel2 is a single element, while sel3 is a NodeList of elements with the class "container".

      let sel4 = document.querySelectorAll("li");
      console.log(sel4);
      // sel4 is a NodeList of all <li> elements in the document.
      // querySelectorAll returns a static NodeList, meaning that it does not automatically update when the document changes. If you add or remove <li> elements after calling querySelectorAll, sel4 will not reflect those changes.

      let sel5 = document.getElementsByTagName("li");
      console.log(sel5);
      // sel5 is an HTMLCollection of all <li> elements in the document.
      // getElementsByTagName returns a live HTMLCollection, meaning that it automatically updates when the document changes. If you add or remove <li> elements after calling getElementsByTagName, sel5 will reflect those changes.

      let sel6 = document.getElementsByName("nav");
      console.log(sel6);
      // sel6 is an HTMLCollection of all elements with the name attribute "nav". In this case, there are no elements with the name "nav", so sel6 will be an empty HTMLCollection.

      let sel7 = document.getElementsByClassName("nav");
      console.log(sel7);
      // sel7 is an HTMLCollection of all elements with the class "nav". In this case, there are no elements with the class "nav", so sel7 will be an empty HTMLCollection.

      let sel8 = document.querySelectorAll("#nav>li");
      console.log(sel8);
      // sel8 is a NodeList of all <li> elements that are direct children of the element with the id "nav". In this case, it will contain all four <li> elements in the <ul>. Here li refers to direct elements that have  li tag and are direct children of the element with id "nav".
    </script>
  </body>
</html>
