<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
    <script>
      // If JS code written here, it will execute before the HTML is loaded
      var a = 12;
      var b = "MyName";
      c = 13.2;

      console.log(b + a);
      console.log(c);

      x = "Cat";

      y = `${x} is a pet`;
      console.log(x);
      console.log(y);

      var l = y.length;
      console.log(`Length of y is ${l}`);

      var s = new String("Hello World");
      console.log(s);
    </script>
  </head>
  <body>
    <div class="container">
      <h1>This is a paragraph</h1>
    </div>
  </body>
  <script>
    // If JS code written here, it will execute after the HTML is loaded
  </script>
</html>
